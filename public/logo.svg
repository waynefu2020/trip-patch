<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!-- 外框：竖版圆角矩形，像一张旅行海报/照片 -->
  <rect x="8" y="4" width="64" height="92" rx="8" stroke="#2C2418" stroke-width="5"/>

  <!-- 上半部分：建筑冰箱贴风格图标 -->
  <!-- 屋顶 -->
  <path d="M32 24 L40 14 L48 24" stroke="#2C2418" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 主体 -->
  <rect x="32" y="24" width="16" height="16" rx="1" stroke="#2C2418" stroke-width="4"/>
  <!-- 拱形门 -->
  <path d="M36 40 L36 32 Q40 26 44 32 L44 40" stroke="#2C2418" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 太阳 -->
  <circle cx="54" cy="18" r="3.5" fill="#2C2418"/>

  <!-- 中间分隔线：上下分区海报特征 -->
  <line x1="16" y1="54" x2="64" y2="54" stroke="#2C2418" stroke-width="3" stroke-linecap="round"/>

  <!-- 下半部分：柔和起伏的地平线/风景 -->
  <path d="M16 76 C24 68 32 72 40 66 C48 60 56 68 64 62" stroke="#2C2418" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
